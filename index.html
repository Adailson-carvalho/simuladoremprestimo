<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Simulador de Empréstimo ADS | Taxa personalizada</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>

<div class="loan-card">
  <div class="card-header">
    <h1><i class="fas fa-hand-holding-usd"></i> Simulador ADS</h1>
    <p>Taxa reduzida para valores até R$ 999,99 • Crédito transparente</p>
  </div>

  <div class="form-body">
    <div class="input-group">
      <label><i class="fas fa-user"></i> Nome completo</label>
      <input type="text" id="nome" placeholder="Ex: Adailson Carvalho" autocomplete="name">
    </div>

    <div class="input-group">
      <label><i class="fab fa-whatsapp"></i> Telefone (WhatsApp)</label>
      <input type="tel" id="telefone" placeholder="(11) 99999-9999" autocomplete="tel">
    </div>

    <div class="double-row">
      <div class="input-group">
        <label><i class="fas fa-coins"></i> Valor (R$)</label>
        <input type="number" id="valor" step="100" min="100" value="2500" placeholder="Ex: 1500">
      </div>
      <div class="input-group">
        <label><i class="fas fa-calendar-alt"></i> Parcelas</label>
        <select id="parcelas">
          <option value="1">1x</option>
          <option value="2">2x</option>
          <option value="3" selected>3x</option>
          <option value="4">4x</option>
          <option value="5">5x</option>
          <option value="6">6x</option>
          <option value="7">7x</option>
          <option value="8">8x</option>
          <option value="9">9x</option>
          <option value="10">10x</option>
          <option value="11">11x</option>
          <option value="12">12x</option>
        </select>
      </div>
    </div>

    <div class="input-group">
      <label><i class="fas fa-calendar-check"></i> Data de Pagamento</label>
      <input type="date" id="dataPagamento" value="">
    </div>

    <div class="result-area" id="resultadoPanel">
      <div class="result-title">
        <i class="fas fa-chart-simple"></i> Simulação personalizada
      </div>
      <div class="result-content" id="resultado">
        <span style="opacity:0.7;">Preencha os campos acima</span>
      </div>
    </div>

    <div class="buttons-row">
      <button class="btn-whatsapp" id="btnWhatsapp">
        <i class="fab fa-whatsapp"></i> Enviar para WhatsApp
      </button>
      <button class="btn-clear" id="btnLimpar">
        <i class="fas fa-eraser"></i> Limpar
      </button>
    </div>
  </div>

  <div class="card-footer">
    <i class="fas fa-lock"></i> Simulação sem compromisso • taxas: 10% a.m. (valores ≥ R$1.000) ou 7% a.m. (até R$999,99)
  </div>
</div>

<div id="toastMsg" class="toast-msg">
  ✅ Mensagem pronta
</div>

<script src="script.js"></script>
</body>
</html>
