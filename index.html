<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Simulador de Empréstimo ADS | Taxa personalizada</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>

<div class="loan-card">
  <div class="card-header">
    <h1><i class="fas fa-hand-holding-usd"></i> Simulador ADS</h1>
    <p>Taxa reduzida para valores acima R$ 999,99 • Crédito transparente</p>
  </div>

  <div class="form-body">
    <div class="input-group">
      <label><i class="fas fa-user"></i> Nome completo</label>
      <input type="text" id="nome" placeholder="Digite seu nome completo" autocomplete="name">
    </div>

    <div class="input-group">
      <label><i class="fas fa-phone"></i> Telefone para contato</label>
      <input type="tel" id="telefone" placeholder="(11) 99999-9999" autocomplete="tel">
    </div>

    <div class="double-row">
      <div class="input-group">
        <label><i class="fas fa-coins"></i> Valor (R$)</label>
        <input type="text" id="valor" placeholder="R$ 0,00" autocomplete="off" inputmode="numeric">
      </div>
      <div class="input-group">
        <label><i class="fas fa-calendar-alt"></i> Parcelas</label>
        <input type="number" id="parcelas" min="1" max="24" value="" step="1" placeholder="Ex: 6" inputmode="numeric">
      </div>
    </div>

    <div class="input-group">
      <label><i class="fas fa-calendar-check"></i> Data de Pagamento</label>
      <input type="date" id="dataPagamento" value="">
    </div>

    <div class="result-area" id="resultadoPanel">
      <div class="result-title">
        <i class="fas fa-chart-line"></i> Simulação personalizada
      </div>
      <div class="result-content" id="resultado">
        <span style="opacity:0.7;">Preencha os campos acima</span>
      </div>
    </div>

    <div class="buttons-row">
      <button class="btn-whatsapp" id="btnWhatsapp">
        <i class="fab fa-whatsapp"></i> Enviar Simulação
      </button>
      <button class="btn-clear" id="btnLimpar">
        <i class="fas fa-eraser"></i> Limpar
      </button>
    </div>
  </div>

  <div class="card-footer">
    <i class="fas fa-lock"></i> Simulação sem compromisso • taxas: 10% a.m. (valores até R$999,99) ou 7% a.m. (acima de R$1.000)
  </div>
</div>

<div id="toastMsg" class="toast-msg">
  ✅ Mensagem pronta
</div>

<script src="script.js"></script>
</body>
</html>
