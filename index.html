<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Simulador de Empréstimo ADS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

 
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h1>Simulador de Empréstimo ADS</h1>

    <label>Nome</label>
    <input type="text" id="nome">

    <label>Telefone</label>
    <input type="text" id="telefone">

    <label>Valor (R$)</label>
    <input type="number" id="valor">

    <label>Parcelas</label>
    <input type="number" id="parcelas">

    <label>Data de Pagamento</label>
    <input type="date" id="dataPagamento">

    <!--<button class="btn-simular" onclick="calcular()">Simular</button>-->
    <button class="btn-whatsapp" onclick="enviarWhats()">Enviar para WhatsApp</button>
    <button class="btn-limpar" onclick="limparCampos()">Limpar</button>

    <div class="resultado" id="resultado"></div>
  </div>

  <!-- JS -->
   <script type="module" src="script.js"></script>

</body>
</html>
